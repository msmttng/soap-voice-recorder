<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f8f9fb;
    }
    .header {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .content { padding: 14px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status.ok { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .status.warn { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    h3 { font-size: 12px; font-weight: 600; color: #5a6178; margin-bottom: 8px; }
    .steps {
      list-style: none;
      padding: 0;
    }
    .steps li {
      position: relative;
      padding: 8px 0 8px 28px;
      font-size: 12px;
      line-height: 1.5;
      color: #374151;
    }
    .steps li::before {
      content: attr(data-step);
      position: absolute;
      left: 0;
      top: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ede9fe;
      color: #7c3aed;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .steps li + li { border-top: 1px solid #f0f0f5; }
    .footer {
      padding: 12px 14px;
      background: #f0f2f7;
      font-size: 11px;
      color: #9098b0;
      text-align: center;
    }
    a { color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 SOAP → Zephyrus</h1>
    <p>AI薬歴を薬歴入力に自動ペースト</p>
  </div>
  <div class="content">
    <div id="status" class="status ok">
      ✅ zephyrus.jp で有効
    </div>

    <h3>使い方</h3>
    <ol class="steps">
      <li data-step="1">
        <strong>SOAP Recorder</strong> のAI薬歴タブで録音 → AI分析
      </li>
      <li data-step="2">
        「📋 クリップボードにコピー」をタップ
      </li>
      <li data-step="3">
        <strong>Zephyrus</strong> で患者を選択
      </li>
      <li data-step="4">
        右下の <strong>📋ボタン</strong> をクリック → 自動ペースト
      </li>
    </ol>
  </div>
  <div class="footer">
    <a href="https://msmttng.github.io/soap-voice-recorder/" target="_blank">
      SOAP Voice Recorder を開く ↗
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
